build:
  builder: NIXPACKS

deploy:
  startCommand: "python manage.py migrate && python manage.py seed_demo && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
  healthcheckPath: /api/health/
  healthcheckTimeout: 30
  restartPolicyType: ON_FAILURE
  restartPolicyMaxRetries: 3
